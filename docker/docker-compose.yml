version: "3"

services:
    web:
        image: caddy:alpine
        restart: always
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - ../html:/www:ro
            - ./data/logs:/logs
        labels:
            caddy: buildwithpi.ai, buildwithpi.com, www.buildwithpi.ai, pi.dev, www.pi.dev, shittycodingagent.ai
            caddy.reverse_proxy: "{{upstreams 80}}"
        networks:
            - caddy-network

    install-counter:
        image: node:22-alpine
        restart: always
        working_dir: /app
        command: ["node", "server/install-counter.mjs"]
        environment:
            PORT: "8787"
            COUNTS_PATH: /data/install-counts.json
            FLUSH_INTERVAL_MS: "30000"
        volumes:
            - ..:/app:ro
            - ./data:/data
        networks:
            - caddy-network

networks:
    caddy-network:
        external: true
