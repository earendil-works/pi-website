version: "3"

services:
    web:
        image: caddy:alpine
        restart: always
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - ../html:/www:ro
            - ./data/logs:/logs
        labels:
            caddy: buildwithpi.ai, buildwithpi.com, www.buildwithpi.ai, pi.dev, www.pi.dev
            caddy.reverse_proxy: "{{upstreams 80}}"
        networks:
            - caddy-network

networks:
    caddy-network:
        external: true
