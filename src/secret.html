<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" type="text/css" href="/style.css">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>pi-chat secret</title>
<style>
.secret-container {
    max-width: 520px;
    margin: 3rem auto;
    padding: 0 1rem;
}
.secret-label {
    color: var(--accent);
    text-transform: uppercase;
    font-family: var(--font-sans);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    margin-bottom: 0.25rem;
}
.secret-title {
    font-family: var(--font-sans);
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
}
.secret-desc {
    color: var(--dimmed-text-color);
    margin-bottom: 1.25rem;
    line-height: 1.5;
}
.secret-textarea {
    width: 100%;
    height: 120px;
    background: var(--terminal-bg, #18181b);
    color: var(--text-color);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 0.75rem;
    font-family: var(--font-mono);
    font-size: 0.875rem;
    resize: vertical;
}
.secret-textarea:focus {
    outline: none;
    border-color: var(--accent);
}
.secret-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.6rem 1.25rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.9rem;
    font-weight: 500;
    margin-top: 0.75rem;
    margin-right: 0.5rem;
}
.secret-btn:hover {
    opacity: 0.9;
}
.secret-output {
    background: var(--terminal-bg, #18181b);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 0.75rem;
    word-break: break-all;
    white-space: pre-wrap;
    user-select: all;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    max-height: 180px;
    overflow: auto;
    margin-top: 0.5rem;
}
#result { display: none }
#status { margin: 0.5rem 0; font-family: var(--font-sans); font-size: 0.9rem }
.ok { color: #22c55e }
.err { color: #ef4444 }
</style>
</head>
<body>
<nav class="sticky-nav" id="stickyNav">
    <div class="sticky-nav-inner">
        <a href="/" class="sticky-nav-logo">
            <img src="/logo.svg" alt="pi">
        </a>
    </div>
</nav>

<div class="secret-container">
    <div class="secret-label">pi-chat · secret input</div>
    <h2 class="secret-title" id="title">Secret Input</h2>
    <p class="secret-desc" id="desc"></p>

    <textarea class="secret-textarea" id="secret" placeholder="Paste secret value here..."></textarea>
    <br>
    <button class="secret-btn" onclick="go()">Encrypt</button>
    <p id="status"></p>

    <div id="result">
        <p style="margin-top:1rem;color:var(--dimmed-text-color);font-size:0.9rem">Paste this into chat:</p>
        <div class="secret-output" id="output"></div>
        <button class="secret-btn" onclick="navigator.clipboard.writeText(output.textContent).then(()=>{status.textContent='Copied!';status.className='ok'})">Copy to clipboard</button>
    </div>
</div>

<script>
let P,R;
try {
  let raw = location.hash.slice(1);
  try { raw = decodeURIComponent(raw); } catch {}
  const h = JSON.parse(raw);
  if (h.n) document.getElementById("title").textContent = h.n;
  if (h.d) document.getElementById("desc").textContent = h.d;
  P = h.k;
  R = h.r;
  if (!P || !R) throw new Error("Missing key or request id");
} catch(e) {
  document.querySelector(".secret-container").innerHTML =
    '<div class="secret-label">pi-chat · secret input</div>' +
    '<h2 class="secret-title">Error</h2>' +
    '<p class="secret-desc">' + e.message + '</p>';
}

async function go() {
  const s = document.getElementById("secret").value;
  if (!s.trim()) return;
  const status = document.getElementById("status");
  status.textContent = "Encrypting...";
  status.className = "";
  try {
    const b = Uint8Array.from(atob(P), c => c.charCodeAt(0));
    const pk = await crypto.subtle.importKey("spki", b.buffer, {name:"RSA-OAEP",hash:"SHA-256"}, false, ["encrypt"]);
    const ak = await crypto.subtle.generateKey({name:"AES-GCM",length:256}, true, ["encrypt"]);
    const rk = new Uint8Array(await crypto.subtle.exportKey("raw", ak));
    const ek = new Uint8Array(await crypto.subtle.encrypt({name:"RSA-OAEP"}, pk, rk));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv}, ak, new TextEncoder().encode(s)));
    const t = new Uint8Array(2 + ek.length + 12 + ct.length);
    t[0] = ek.length >> 8; t[1] = ek.length & 255;
    t.set(ek, 2);
    t.set(iv, 2 + ek.length);
    t.set(ct, 2 + ek.length + 12);
    const msg = "!secret:" + R + ":" + btoa(String.fromCharCode(...t));
    document.getElementById("output").textContent = msg;
    document.getElementById("result").style.display = "block";
    try {
      await navigator.clipboard.writeText(msg);
      status.textContent = "Encrypted and copied to clipboard!";
      status.className = "ok";
    } catch {
      status.textContent = "Encrypted. Copy the text above manually.";
      status.className = "ok";
    }
  } catch(e) {
    status.textContent = "Encryption failed: " + e.message;
    status.className = "err";
  }
}
</script>
</body>
</html>
