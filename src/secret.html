<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pi secret input</title>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#111;color:#ddd;max-width:480px;margin:40px auto;padding:16px}
h3{color:#7c3aed;margin:0 0 4px}
p.desc{color:#999;margin:0 0 12px}
textarea{width:100%;height:120px;background:#1a1a2e;color:#ddd;border:1px solid #444;border-radius:4px;padding:8px;font-family:monospace;resize:vertical}
button{background:#7c3aed;color:#fff;border:0;padding:8px 16px;border-radius:4px;cursor:pointer;margin:6px 4px 6px 0;font-size:14px}
button:hover{background:#6d28d9}
pre{background:#1a1a2e;padding:10px;border-radius:4px;word-break:break-all;white-space:pre-wrap;user-select:all;max-height:180px;overflow:auto}
#result{display:none}
.ok{color:#22c55e}
.err{color:#ef4444}
#status{margin:6px 0}
</style>
</head>
<body>
<h3 id="title">Secret Input</h3>
<p class="desc" id="desc"></p>
<textarea id="secret" placeholder="Paste secret value here..."></textarea>
<br>
<button onclick="go()">Encrypt &amp; copy</button>
<p id="status"></p>
<div id="result">
<p>Paste this into chat:</p>
<pre id="output"></pre>
<button onclick="navigator.clipboard.writeText(output.textContent).then(()=>{status.textContent='Copied!';status.className='ok'})">Copy</button>
</div>
<script>
let P,R;
try {
  let raw = location.hash.slice(1);
  try { raw = decodeURIComponent(raw); } catch {}
  const h = JSON.parse(raw);
  if (h.n) document.getElementById("title").textContent = h.n;
  if (h.d) document.getElementById("desc").textContent = h.d;
  P = h.k;
  R = h.r;
  if (!P || !R) throw new Error("Missing key or request id");
} catch(e) {
  document.body.textContent = "Invalid or missing parameters: " + e.message;
}

async function go() {
  const s = document.getElementById("secret").value;
  if (!s.trim()) return;
  const status = document.getElementById("status");
  status.textContent = "Encrypting...";
  status.className = "";
  try {
    const b = Uint8Array.from(atob(P), c => c.charCodeAt(0));
    const pk = await crypto.subtle.importKey("spki", b.buffer, {name:"RSA-OAEP",hash:"SHA-256"}, false, ["encrypt"]);
    const ak = await crypto.subtle.generateKey({name:"AES-GCM",length:256}, true, ["encrypt"]);
    const rk = new Uint8Array(await crypto.subtle.exportKey("raw", ak));
    const ek = new Uint8Array(await crypto.subtle.encrypt({name:"RSA-OAEP"}, pk, rk));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv}, ak, new TextEncoder().encode(s)));
    const t = new Uint8Array(2 + ek.length + 12 + ct.length);
    t[0] = ek.length >> 8; t[1] = ek.length & 255;
    t.set(ek, 2);
    t.set(iv, 2 + ek.length);
    t.set(ct, 2 + ek.length + 12);
    const msg = "!secret:" + R + ":" + btoa(String.fromCharCode(...t));
    document.getElementById("output").textContent = msg;
    document.getElementById("result").style.display = "block";
    try {
      await navigator.clipboard.writeText(msg);
      status.textContent = "Encrypted and copied to clipboard!";
      status.className = "ok";
    } catch {
      status.textContent = "Encrypted. Copy the text above manually.";
      status.className = "ok";
    }
  } catch(e) {
    status.textContent = "Encryption failed: " + e.message;
    status.className = "err";
  }
}
</script>
</body>
</html>
